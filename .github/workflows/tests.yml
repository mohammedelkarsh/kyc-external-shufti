name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  tests:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4']

    steps:
      - uses: actions/checkout@v4

      - name: Checkout kyc-ai/laravel
        uses: actions/checkout@v4
        with:
          repository: mohammedelkarsh/laravel-kyc-ai
          path: laravel-kyc-ai
          ref: v1.1.0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, sqlite, pdo_sqlite, intl
          coverage: none

      - name: Configure path dependency
        run: |
          composer config repositories.kyc-ai path ./laravel-kyc-ai
          composer config minimum-stability dev
          composer config prefer-stable true

      - name: Install dependencies
        run: composer update --prefer-dist --no-interaction --no-progress

      - name: Run PHPUnit
        run: composer test
